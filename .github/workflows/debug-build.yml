name: Debug APK (no signing secrets required)

on:
  push:
    branches: [ "**" ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: google-services.json and extra strings file
        env:
          GOOGLE_SERVICES_BASE64: ${{ secrets.GOOGLE_SERVICES_BASE64 }}
          STRINGS_OTHER_BASE64: ${{ secrets.STRINGS_OTHER }}
        run: |
          if [ -n "$GOOGLE_SERVICES_BASE64" ]; then
            echo "$GOOGLE_SERVICES_BASE64" | base64 --decode > ./app/google-services.json
          else
            cp ./app/google-services.example ./app/google-services.json
          fi
          if [ -n "$STRINGS_OTHER_BASE64" ]; then
            echo "$STRINGS_OTHER_BASE64" | base64 --decode > ./app/src/main/res/values/strings_other.xml
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK with commit info
        run: cp ./app/build/outputs/apk/debug/*.apk ./immich-tv-debug.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: immich-tv-debug.apk
          path: ./app/build/outputs/apk/debug/*.apk

      - name: Publish as a Release (direct, unzipped download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: "Latest debug build (${{ github.sha }})"
          body: "Automatically built debug APK from the latest push. Debug-signed, for personal sideloading only."
          prerelease: true
          files: ./immich-tv-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
