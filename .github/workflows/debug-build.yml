name: Debug APK (no signing secrets required)

# Builds a debug APK on every push to any branch. Unlike Android CI
# (android.yml), this does not need RELEASE_KEYSTORE_* secrets, which
# only exist in the upstream repo and are never copied to forks. Debug
# builds are signed with the standard Android debug key, which is
# always available, and are perfectly fine for sideloading onto your
# own device via Downloader/adb.
on:
  push:
    branches: [ "**" ]
  workflow_dispatch: {}

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: google-services.json and extra strings file
        env:
          GOOGLE_SERVICES_BASE64: ${{ secrets.GOOGLE_SERVICES_BASE64 }}
          STRINGS_OTHER_BASE64: ${{ secrets.STRINGS_OTHER }}
        run: |
          if [ -n "$GOOGLE_SERVICES_BASE64" ]; then
            echo "$GOOGLE_SERVICES_BASE64" | base64 --decode > ./app/google-services.json
          else
            cp ./app/google-services.example ./app/google-services.json
          fi
          if [ -n "$STRINGS_OTHER_BASE64" ]; then
            echo "$STRINGS_OTHER_BASE64" | base64 --decode > ./app/src/main/res/values/strings_other.xml
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: immich-tv-debug.apk
          path: ./app/build/outputs/apk/debug/*.apk
